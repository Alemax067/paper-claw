services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: paper-claw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: paper_claw
      POSTGRES_USER: paper_claw
      POSTGRES_PASSWORD: paper_claw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
